name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: CI only reads the checkout. Fork PRs already get a read-only token, but
# stating it explicitly caps the blast radius on same-repo pushes too (#333).
permissions:
  contents: read

jobs:
  quality:
    name: lint-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type-check)
        run: mypy

      - name: Pytest
        run: pytest
