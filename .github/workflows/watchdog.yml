name: watchdog

# Infra + strategy watchdogs (#340/#341): scheduled HOSTED-runner monitor over the public
# dashboard payloads (status.json / published.json / stats.json on the dashboard-data branch).
# Plain-Python thresholds — no model, no secrets beyond GITHUB_TOKEN, zero box load (it never
# touches the VPS or its runner). Breaches open deterministic `[watchdog] <family>/<slug>`
# issues (labels: alert + infra|strategy) with open/close hysteresis and reopen-not-recreate
# anti-flap; recovery auto-closes them. All logic lives in src/small_cap_stack/watchdog.py
# (typed + unit-tested); this file only wires it up.
#
# Cadence: every 10 min inside a UTC envelope around the ET monitor window; the script itself
# gates precisely on the XNYS trading calendar + 04:00–17:00 ET and exits quietly outside it.
# GitHub `schedule` is best-effort and auto-disables after ~60 days of repo inactivity, so this
# workflow is guarded three ways (#345): a redundant workflow_run trigger chained off each
# publish-dashboard completion, the monthly workflow-keepalive re-enable, and a dedicated
# Healthchecks dead-man ping as the last step — if the monitor dies anyway, THAT goes silent
# and alerts out-of-band, independent of GitHub.

on:
  schedule:
    - cron: "*/10 8-21 * * 1-5" # UTC envelope; exact ET/calendar gate is in the script
  workflow_run:
    workflows: [publish-dashboard] # redundant non-schedule trigger (#345): fresh data in, run
    types: [completed]
  workflow_dispatch:
    inputs:
      force:
        description: Run even outside the monitor window
        type: boolean
        default: false

concurrency:
  group: watchdog
  cancel-in-progress: false

permissions: {} # job-level below; nothing by default (#348 least-privilege)

jobs:
  watch:
    name: watchdog
    # Never run from a fork (#333 A1 pattern) — and this job must NEVER move to the vps runner.
    if: ${{ github.repository == 'bennetwi92/small-cap-stack' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write # open/reopen/close alert issues
      contents: write # force-push the single-commit monitor-state branch
      # Dispatch self-heal for freshly-opened alerts (#336): GITHUB_TOKEN issue events can't
      # trigger `on: issues` workflows (recursion prevention) — workflow_dispatch is the
      # sanctioned path. This watchdog is deterministic reviewed code, not an agent.
      actions: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Only the calendar dep — the watchdog module deliberately imports nothing heavier from
      # the package (clock + market_calendar), so no full `pip install -e .` on every run.
      - name: Install calendar dependency
        run: pip install --quiet exchange-calendars

      - name: Load monitor state
        run: |
          set -euo pipefail
          git fetch -q origin monitor-state || true
          git show FETCH_HEAD:infra_state.json > state.json 2>/dev/null || echo '{}' > state.json

      - name: Run watchdog checks
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: src
        run: |
          set -euo pipefail
          python -m small_cap_stack.watchdog --state state.json --opened-file opened.json \
            ${{ inputs.force && '--force' || '' }}

      # Self-heal handoff (#336): dispatch one diagnosis run per alert opened THIS run. See the
      # actions:write comment above for why this is a dispatch and not an `on: issues` trigger.
      - name: Trigger self-heal for new alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ -f opened.json ] || exit 0
          for n in $(jq -r '.[]' opened.json); do
            gh workflow run self-heal.yml --field issue="$n"
            echo "self-heal dispatched for #$n"
          done

      # Same single-commit force-push pattern as publish-dashboard: the branch never grows.
      # Skipped when nothing changed (e.g. runs outside the monitor window) — no commit churn.
      - name: Save monitor state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if git show FETCH_HEAD:infra_state.json 2>/dev/null | cmp -s - state.json; then
            echo "state unchanged — skipping push"
            exit 0
          fi
          rm -rf stateout && mkdir stateout
          cp state.json stateout/infra_state.json
          cd stateout
          git init -q
          git checkout -q -b monitor-state
          git config user.email "actions@github.com"
          git config user.name "scs-watchdog-bot"
          git add -A
          git commit -qm "watchdog state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" monitor-state

      # Monitor-the-monitor (#345): a dedicated Healthchecks dead-man ping, deliberately LAST —
      # any failed step above (fetch, thresholds, state push) withholds it, so a broken monitor
      # alerts out-of-band even though every GitHub-side signal looks quiet. Runs outside the
      # market window / via the publish-dashboard chain ping too: the check asserts "the
      # monitoring machinery is alive", not "checks were evaluated". No-op until the owner
      # creates the Healthchecks check and the WATCHDOG_HEARTBEAT_URL secret (RUNBOOK §7);
      # the URL is effectively a write credential, so it lives ONLY in a secret (#344).
      - name: Monitor-ran heartbeat
        env:
          HC_URL: ${{ secrets.WATCHDOG_HEARTBEAT_URL }}
        run: |
          set -euo pipefail
          if [ -n "$HC_URL" ]; then
            curl -fsS -m 10 --retry 3 -o /dev/null "$HC_URL"
            echo "heartbeat pinged"
          else
            echo "WATCHDOG_HEARTBEAT_URL secret not set — heartbeat skipped (#345)"
          fi
