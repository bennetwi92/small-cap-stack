name: overnight-analyst

# Overnight analyst (#337): a nightly Sonnet pass over the day's PUBLIC outputs — stats.json
# (EOD aggregates + per-opportunity analysis rows), status.json, canary.json — appended as one
# comment to a standing journal issue. Flags tick-health drift, R-capture changes, and anything
# that contradicts research/decisions.md.
#
# Quota discipline (the review marked this post-MVP precisely because an unconditional nightly
# model loop burns Max quota, #349):
# - Calendar-gated in code: skips instantly (no model) on non-trading days.
# - ONE Sonnet run per trading day, reading only already-public data — no data-export dispatch,
#   no box interaction, structurally zero box risk (no actions:write). Deep Parquet analysis
#   stays on-demand via the box-data flow from a real session.
# - To pause it entirely, comment out the `schedule:` block — everything else is inert.
# - No positions/account detail exists at P1 and the prompt forbids inventing any (#344).
#
# Cron is 22:00 ET nominal (02:00/03:00 UTC); GitHub's schedule throttling may drift it — for a
# nightly digest that is harmless.

on:
  schedule:
    - cron: "23 3 * * 2-6" # Tue–Sat UTC ≈ Mon–Fri evening ET; odd minute dodges the crush
  workflow_dispatch: {}

permissions: {} # job-level below; nothing by default (#348)

concurrency:
  group: overnight-analyst
  cancel-in-progress: false

jobs:
  analyse:
    name: nightly digest
    if: ${{ github.repository == 'bennetwi92/small-cap-stack' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # read research/ docs for the drift check
      issues: write # append to the journal issue
      id-token: write # OIDC exchange for the action's GitHub App token (fails without it)
    steps:
      - name: Gate on the Max-subscription token
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN is not set — analyst is inert (RUNBOOK §13)."
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.ok == 'true'
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.ok == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Calendar gate BEFORE any model spend: the session being analysed is "today in ET" at
      # ~22:00-02:00 ET run time — i.e. the ET date at (run time - 6h) to stay correct even if
      # GitHub's schedule lag pushes the run past midnight ET.
      - name: Calendar gate (no model on non-trading days)
        id: cal
        if: steps.gate.outputs.ok == 'true'
        env:
          PYTHONPATH: src
        run: |
          set -euo pipefail
          pip install --quiet exchange-calendars
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import timedelta
          from small_cap_stack.clock import now_et
          from small_cap_stack.market_calendar import is_trading_day
          session = (now_et() - timedelta(hours=6)).date()
          print(f"trading={'true' if is_trading_day(session) else 'false'}")
          print(f"session={session.isoformat()}")
          PY
          cat "$GITHUB_OUTPUT" || true

      - name: Analyse the session
        if: steps.gate.outputs.ok == 'true' && steps.cal.outputs.trading == 'true'
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1 (#348 SHA-pinned)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-5" # §4 cap: never escalate the nightly to Opus
          prompt: |
            You are the OVERNIGHT ANALYST (issue #337) for trading session
            ${{ steps.cal.outputs.session }}.

            Evidence — public payloads only, no box access, do not dispatch anything:
            - https://raw.githubusercontent.com/bennetwi92/small-cap-stack/dashboard-data/stats.json
              (EOD aggregates + per-opportunity analysis rows — your main source)
            - .../status.json (health counters, dataset file counts) and .../canary.json
            - `research/decisions.md` + `research/findings-index.md` in this checkout
            - the journal's own previous entries (for trends)

            Write ONE comment on the standing journal issue:
            1. Find it: `gh issue list --search "[analyst] nightly journal in:title" --state open`.
               If it does not exist, create it once: title `[analyst] nightly journal`, labels
               `data,phase-1`, body "Nightly session digests from the overnight analyst (#337)."
            2. Comment structure (phone-readable, ~15 lines max):
               `### ${{ steps.cal.outputs.session }}` · opportunities + R-capture headline vs
               recent sessions · tick/EOD health notes (over-budget ticks, missed jobs, file
               counts creeping toward the 2000 alert band) · canary verdicts · anything today
               contradicting a locked decision in decisions.md (name the section) · at most ONE
               suggested follow-up, phrased as an issue-worthy question.
            3. If stats.json's trading_date is NOT ${{ steps.cal.outputs.session }}, say only
               that the EOD data is missing/stale and stop — the watchdog owns that alert; do
               not diagnose it here.
            Never include account, position, or credential details (none exist at P1 — do not
            invent any, #344). No code changes, no PRs, no labels beyond the journal's own.
