name: backfill-dashboard

# Phone-triggerable one-off: (re)generate the dashboard JSON (stats.json / charts.json / dated
# charts/<date>.json + index.json) straight from the store in the app's docker volume. Use it for a
# single past trading date whose EOD ran on code that predated a dashboard feature (e.g. annotated
# charts #113) so its artifact is missing, or with `all: true` to backfill the whole archive at once
# so the review workbench's date picker is populated from day one (#141) — rather than waiting for
# the next 16:30 ET EOD.
#
# Runs on the SELF-HOSTED runner (on the box) so it can `docker exec` the app container, which owns
# the store. Pure store-read + projection — no IBKR, no live state — so it's safe any time.
# The existing `publish-dashboard` cron (*/15) then pushes the refreshed files to the
# `dashboard-data` branch; dispatch that workflow too if you want it live immediately.
#
# PREREQUISITE: the box must already be running code that contains
# `small_cap_stack.dashboard_backfill` — deploy the charts feature (deploy.yml) first.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Trading date to rebuild (YYYY-MM-DD). Blank = yesterday (ET)."
        required: false
        default: ""
      all:
        description: "Full-archive: dated charts + index for EVERY collected date (#141). Overrides date."
        type: boolean
        required: false
        default: false
      force:
        description: "Required with 'all'. ⚠️ Full-archive rebuild has OOM-killed the box (#264)."
        type: boolean
        required: false
        default: false

concurrency:
  group: backfill-dashboard
  cancel-in-progress: false

# No GITHUB_TOKEN needed — this job only docker-execs the app container (#333).
permissions: {}

jobs:
  backfill:
    name: regenerate dashboard JSON
    # Repository guard: box job runs only in THIS repo, never a fork (#333, A1 lockdown).
    if: ${{ github.repository == 'bennetwi92/small-cap-stack' }}
    runs-on: [self-hosted, vps]
    steps:
      - name: Regenerate dashboard JSON in the app container
        # Dispatch inputs are read as runtime env vars, never interpolated into the script by the
        # Actions templater — so a crafted input can't inject shell (#333). (Owner-only today, but
        # cheap defense-in-depth, matching data-export.yml.)
        env:
          IN_ALL: ${{ inputs.all }}
          IN_FORCE: ${{ inputs.force }}
          IN_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          cid="$(docker ps --filter 'name=small-cap-stack-app' --format '{{.ID}}' | head -1)"
          if [ -z "$cid" ]; then
            echo "app container not running — cannot reach the store" >&2
            exit 1
          fi
          args=""
          if [ "$IN_ALL" = "true" ]; then
            # A second, separate confirmation — the `all` toggle alone is not enough. --all rebuilds
            # every collected date in one process and has OOM-killed the box (#264), and this
            # workflow is the phone path that would actually do it. Auto-supplying --force here
            # would make the CLI guard theatre.
            if [ "$IN_FORCE" != "true" ]; then
              echo "Refusing --all without 'force'. It rebuilds every collected date in one" >&2
              echo "process and has OOM-killed the box (#264). Prefer a single 'date'." >&2
              echo "If you really mean the full archive, re-run with force: true." >&2
              exit 1
            fi
            args="--all --force"
          elif [ -n "$IN_DATE" ]; then
            args="--date $IN_DATE"
          fi
          docker exec "$cid" python -m small_cap_stack.dashboard_backfill $args
