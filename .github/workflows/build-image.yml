name: build-image

# Build the app image for amd64 (Hetzner CX / x86 VPS) so the VM can deploy by *pulling* a versioned
# image instead of building on-box. PRs build-only (validate the Dockerfile); main + tags push to GHCR.
# Pairs with deploy.yml, which pulls the `sha-<short>` tag this pushes (#278).
#
# NOTE: main/tags are deliberately NOT path-filtered. deploy.yml resolves the image by the deployed
# commit's SHA, so *every* commit on main needs an image — a filtered build leaves commits that
# touched only e.g. deploy/ with no image to deploy (that was #265's SHA: on main, never built).
# The repo is public, so the extra runs cost no Actions minutes, and `cache-from: type=gha` makes a
# no-op rebuild cheap.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate + push on main/tags (and manual runs); PRs validate the build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Must match BOTH metadata-action's `type=sha` tag (sha-<7>) and the short SHA the dashboard
      # shows as DEPLOYED_COMMIT (RUNBOOK §11) — deploy.yml resolves the image by this exact tag.
      - name: Short SHA
        id: sha
        run: echo "short=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
