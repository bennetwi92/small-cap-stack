name: build-image

# Build the app image for amd64 (Hetzner CX / x86 VPS) so the VM can deploy by *pulling* a versioned
# image instead of building on-box. PRs build-only (validate the Dockerfile); main + tags push to GHCR.
# Pairs with deploy.yml (the self-hosted runner / a pull-based updater consumes the pushed tag).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/build-image.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate + push on main/tags (and manual runs); PRs validate the build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
