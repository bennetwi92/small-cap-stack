name: commands

# Control plane (#338): guarded slash-commands turn an issue/PR comment into a validated
# workflow_dispatch — the phone UI that replaces digging through the Actions tab, with the box
# rules enforced IN CODE so a fat-finger can't OOM the CX23. 100% deterministic bash: no model,
# no quota, replies in seconds.
#
# Commands (OWNER only — these reach the live box):
#   /backfill YYYY-MM-DD              recompute ONE past date (no --all lane exists here; today
#                                     is rejected — a live-day backfill has OOM'd the box, #264)
#   /deploy [ref]                     deploy a ref (default main)
#   /restart                          deploy --restart_only (container restart, no code change)
#   /export <dataset> [start] [end]   data-export to the data-export branch (no raw-SQL lane)
#   /status                           model-free health digest from the public payloads
# Unknown /commands are ignored silently (so /spec stays spec.yml's, #339).
#
# Security (#343/#348): OWNER-only author gate (stricter than the dev loop); the comment body is
# read from an env var, never interpolated into the script (the classic expression-injection
# hole); every argument is validated against a strict pattern before it reaches
# `gh workflow run`; explicit least-privilege permissions.

on:
  issue_comment:
    types: [created]

permissions: {} # job-level below; nothing by default (#348)

concurrency:
  group: commands
  cancel-in-progress: false

jobs:
  run:
    name: control-plane command
    if: >-
      github.repository == 'bennetwi92/small-cap-stack' &&
      github.event.comment.author_association == 'OWNER' &&
      startsWith(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    permissions:
      actions: write # dispatch the (already repo-guarded) box workflows
      issues: write # reply + acknowledge on the comment
    steps:
      - name: Parse, validate, dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.comment.body }}
          ISSUE: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          reply() { gh issue comment "$ISSUE" --repo "$REPO" --body "$1"; }
          ack() { gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" -f content='+1' >/dev/null; }
          is_date() { [[ "$1" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && date -d "$1" >/dev/null 2>&1; }

          # First line only; collapsed whitespace; strict tokenization.
          line="$(printf '%s' "$BODY" | head -1 | tr -s ' ')"
          read -r cmd a1 a2 a3 _extra <<<"$line" || true
          today_et="$(TZ=America/New_York date +%F)"

          case "$cmd" in
            /backfill)
              if ! is_date "${a1:-}"; then
                reply "❌ \`/backfill\` needs exactly one date: \`/backfill YYYY-MM-DD\`"; exit 0
              fi
              # The box rule, in code (CLAUDE.md): one PAST date only. ISO dates compare
              # lexicographically, so a plain string compare is exact here.
              if [[ ! "$a1" < "$today_et" ]]; then
                reply "❌ \`$a1\` is not a PAST date (today ET is $today_et). Backfilling the live day has OOM-killed the box (#264) — pick a completed session."; exit 0
              fi
              gh workflow run backfill-dashboard.yml --repo "$REPO" --field date="$a1"
              ack; reply "🚜 Dispatched \`backfill-dashboard\` for \`$a1\` (one date, per the box rules). Watch: https://github.com/${REPO}/actions/workflows/backfill-dashboard.yml"
              ;;
            /deploy)
              ref="${a1:-main}"
              if [[ ! "$ref" =~ ^[A-Za-z0-9._/-]{1,100}$ ]]; then
                reply "❌ ref \`$ref\` fails validation"; exit 0
              fi
              gh workflow run deploy.yml --repo "$REPO" --field ref="$ref"
              ack; reply "🚀 Dispatched \`deploy\` for \`$ref\`. Watch: https://github.com/${REPO}/actions/workflows/deploy.yml"
              ;;
            /restart)
              gh workflow run deploy.yml --repo "$REPO" --field ref=main --field restart_only=true
              ack; reply "🔄 Dispatched \`deploy --restart_only\` (container restart, no code change). Watch: https://github.com/${REPO}/actions/workflows/deploy.yml"
              ;;
            /export)
              case "${a1:-}" in
                bars|opportunities|scanner_hits|news|fundamentals|analysis) ;;
                *) reply "❌ \`/export <dataset> [start] [end]\` — dataset must be one of: bars, opportunities, scanner_hits, news, fundamentals, analysis (no raw-SQL lane from comments)"; exit 0 ;;
              esac
              for d in ${a2:-} ${a3:-}; do
                if ! is_date "$d"; then reply "❌ bad date \`$d\` (YYYY-MM-DD)"; exit 0; fi
              done
              gh workflow run data-export.yml --repo "$REPO" \
                --field dataset="$a1" --field start_date="${a2:-}" --field end_date="${a3:-}"
              ack; reply "📦 Dispatched \`data-export\` for \`$a1\` ${a2:-}..${a3:-} → the \`data-export\` branch."
              ;;
            /status)
              base="https://raw.githubusercontent.com/${REPO}/dashboard-data"
              digest="$(curl -fsS -m 15 "$base/status.json" | jq -r '"generated \(.generated_utc) · connected=\(.service.connected) · opps today=\(.opportunities.open_today) · tick=\(.health.tick // "n/a") · mem_ok=\(.health.mem_ok // "n/a") disk_ok=\(.health.disk_ok // "n/a") · over-budget=\(.health.ticks_over_budget_total // 0) missed=\(.health.jobs_missed_total // 0)"' || true)"
              published="$(curl -fsS -m 15 "$base/published.json" | jq -r .published_utc || true)"
              alerts="$(gh issue list --repo "$REPO" --label alert --state open --json number,title \
                --jq 'if length == 0 then "none" else (map("#\(.number) \(.title)") | join(" · ")) end')"
              ack
              reply "$(printf '📊 box: %s\npublished: %s\nopen alerts: %s' \
                "${digest:-status.json unreachable}" "${published:-unreachable}" "$alerts")"
              ;;
            *)
              exit 0 # not ours (e.g. /spec) — stay silent
              ;;
          esac
