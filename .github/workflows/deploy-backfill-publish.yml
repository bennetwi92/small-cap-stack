name: deploy-backfill-publish

# One-click pipeline that runs the three phone-triggered box workflows in a single graph so you
# don't have to dispatch deploy → backfill → publish-dashboard by hand every time:
#
#   deploy ──▶ backfill ──▶ publish
#
# Defaults cover the everyday case: deploy `main`, backfill *yesterday*, then publish the refreshed
# dashboard JSON. Each job is the same logic as its standalone workflow (deploy.yml /
# backfill-dashboard.yml / publish-dashboard.yml, which all still exist for one-off use). Jobs are
# chained with `needs:`, so a failure in an earlier stage skips the rest.
#
# All three stages run on the SELF-HOSTED `vps` runner (they `docker exec` / `docker cp` the app
# container and read the store directly). Trigger from the phone via the GitHub UI / MCP
# "Run workflow" (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to deploy"
        required: false
        default: main
      image_tag:
        description: "Image tag to deploy (default: sha-<short> of ref). Rollback escape hatch for a commit with no image."
        required: false
        default: ""
      restart_only:
        description: "Restart the running service without pulling new code"
        type: boolean
        required: false
        default: false
      backfill_date:
        description: "Dashboard date to rebuild (YYYY-MM-DD). Blank = yesterday (ET)."
        required: false
        default: ""
      backfill_all:
        description: "Full-archive backfill: EVERY collected date (#141). Overrides backfill_date. ⚠️ heavy on the box."
        type: boolean
        required: false
        default: false
      backfill_force:
        description: "Required with backfill_all. ⚠️ Full-archive rebuild has OOM-killed the box (#264)."
        type: boolean
        required: false
        default: false
      skip_backfill:
        description: "Skip the backfill stage (deploy → publish only)."
        type: boolean
        required: false
        default: false

# Serialise against the standalone workflows' groups so a pipeline run never overlaps a lone
# deploy/backfill/publish on the box.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to vps
    runs-on: [self-hosted, vps]
    steps:
      - name: Update working tree
        if: ${{ !inputs.restart_only }}
        working-directory: /opt/small-cap-stack
        run: |
          set -euo pipefail
          git fetch --all --prune
          git checkout "${{ inputs.ref }}"
          git pull --ff-only origin "${{ inputs.ref }}" || true

      # Kept in lockstep with deploy.yml's equivalent steps (#278).
      - name: Resolve the image tag
        if: ${{ !inputs.restart_only }}
        id: image
        working-directory: /opt/small-cap-stack
        run: |
          set -euo pipefail
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            # Must match build-image.yml's metadata-action `type=sha` tag exactly. Cut to 7 rather
            # than trusting `rev-parse --short`, whose length grows to stay unambiguous.
            TAG="sha-$(git rev-parse HEAD | cut -c1-7)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for the image in GHCR
        if: ${{ !inputs.restart_only }}
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image.outputs.image }}"
          # build-image.yml runs on the *push*, this deploy on a dispatch — so they race. On
          # 2026-07-17 a deploy finished 15s BEFORE its own image was pushed; don't assume, wait.
          # The package is public, so this needs no auth.
          for i in $(seq 1 60); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "$IMAGE is available"
              exit 0
            fi
            echo "waiting for $IMAGE ($i/60)…"
            sleep 10
          done
          echo "::error::$IMAGE never appeared in GHCR after 10m. If this commit predates #278 it may have no image at all (main used to be path-filtered) — re-run with image_tag set to a tag that exists."
          exit 1

      - name: Deploy
        working-directory: /opt/small-cap-stack
        run: |
          set -euo pipefail
          if [ "${{ inputs.restart_only }}" = "true" ]; then
            # Full restart of both services (the "something's wedged" escape hatch).
            systemctl restart small-cap-stack
          else
            # PULL the prebuilt image — never build on-box (#278). Recreates ONLY the app
            # container, so the Gateway keeps its session (no re-login / healthcheck wait).
            # DEPLOYED_COMMIT is baked into the image by build-image.yml.
            TAG="${{ steps.image.outputs.tag }}"
            # Pin in .env so the systemd unit (on reboot) and any manual `docker compose up`
            # resolve this same image instead of drifting to :latest.
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=$TAG" >> .env
            export IMAGE_TAG="$TAG"
            docker compose pull app
            docker compose up -d --no-build app
            # Pulled images accumulate the way build cache used to; drop the now-dangling ones.
            docker image prune -f
          fi

      - name: Health gate
        working-directory: /opt/small-cap-stack
        run: |
          set -euo pipefail
          # Give compose a moment, then assert both services are up and metrics answer.
          for i in $(seq 1 30); do
            if curl -fsS localhost:9090/metrics | grep -q '^scs_'; then
              echo "metrics healthy"; break
            fi
            echo "waiting for metrics ($i)…"; sleep 5
          done
          docker compose -f docker-compose.yml ps
          curl -fsS localhost:9090/metrics | grep -q '^scs_' || { echo "metrics not healthy"; exit 1; }

  backfill:
    name: regenerate dashboard JSON
    needs: deploy
    if: ${{ !inputs.skip_backfill }}
    runs-on: [self-hosted, vps]
    steps:
      - name: Regenerate dashboard JSON in the app container
        run: |
          set -euo pipefail
          cid="$(docker ps --filter 'name=small-cap-stack-app' --format '{{.ID}}' | head -1)"
          if [ -z "$cid" ]; then
            echo "app container not running — cannot reach the store" >&2
            exit 1
          fi
          args=""
          if [ "${{ inputs.backfill_all }}" = "true" ]; then
            # A second, separate confirmation — the `all` toggle alone is not enough. --all rebuilds
            # every collected date in one process and has OOM-killed the box (#264), and this
            # workflow is the phone path that would actually do it. Auto-supplying --force here
            # would make the CLI guard theatre.
            if [ "${{ inputs.backfill_force }}" != "true" ]; then
              echo "Refusing --all without 'backfill_force'. It rebuilds every collected date in one" >&2
              echo "process and has OOM-killed the box (#264). Prefer a single 'backfill_date'." >&2
              echo "If you really mean the full archive, re-run with backfill_force: true." >&2
              exit 1
            fi
            args="--all --force"
          elif [ -n "${{ inputs.backfill_date }}" ]; then
            args="--date ${{ inputs.backfill_date }}"
          fi
          docker exec "$cid" python -m small_cap_stack.dashboard_backfill $args

  publish:
    name: publish dashboard data
    # Run after backfill, but don't block on it being skipped — `always()` lets publish proceed
    # when skip_backfill is set, while still gating on deploy having succeeded.
    needs: [deploy, backfill]
    if: ${{ always() && needs.deploy.result == 'success' && needs.backfill.result != 'failure' }}
    runs-on: [self-hosted, vps]
    permissions:
      contents: write
    steps:
      - name: Extract dashboard JSON from the app container
        run: |
          set -euo pipefail
          rm -rf out && mkdir out
          cid="$(docker ps --filter 'name=small-cap-stack-app' --format '{{.ID}}' | head -1)"
          if [ -n "$cid" ]; then
            docker cp "$cid:/data/dashboard/." out/ 2>/dev/null || true
          fi
          # Guarantee the branch/URL always exists, even before the first tick / EOD.
          [ -f out/status.json ] || echo '{"status":"no data yet"}' > out/status.json
          printf '{"published_utc":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > out/published.json
          ls -la out

      - name: Force-update the dashboard-data branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd out
          git init -q
          git checkout -q -b dashboard-data
          git config user.email "actions@github.com"
          git config user.name "scs-dashboard-bot"
          git add -A
          git commit -qm "dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" dashboard-data
