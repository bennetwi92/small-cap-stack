name: workflow-keepalive

# Anti-disable keep-alive (#345): GitHub auto-disables `schedule` workflows in public repos
# after ~60 days of repo inactivity — and a quiet repo is this design's GOAL ("silence =
# healthy"), so the quieter things get, the likelier the only watchdog silently dies. This
# monthly job calls the idempotent "enable workflow" API for every schedule-bearing workflow,
# which resets that timer. Backstop if THIS workflow is disabled too: the watchdog's
# Healthchecks heartbeat goes silent and alerts out-of-band, independent of GitHub.

on:
  schedule:
    - cron: "17 6 1 * *" # monthly; odd minute dodges the top-of-hour scheduling crush
  workflow_dispatch: {}

permissions: {} # job-level below; nothing by default (#348 least-privilege)

jobs:
  keepalive:
    name: reset the 60-day auto-disable timer
    if: ${{ github.repository == 'bennetwi92/small-cap-stack' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write # `gh workflow enable` — idempotent, never runs anything
    steps:
      - name: Re-enable every schedule-bearing workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for wf in infra-watchdog.yml publish-dashboard.yml workflow-keepalive.yml; do
            gh workflow enable "$wf" --repo "$REPO"
            echo "kept alive: $wf"
          done
