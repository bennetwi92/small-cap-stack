name: spec

# The spec-before-build gate (#339): `/spec` on an issue (or adding the `needs-spec` label) runs
# a RESEARCH-ONLY agent that posts the spec as an issue comment and flips the label to
# `spec-ready` — no branch, no code, no PR. The human gate stays human: the owner reads the spec
# on mobile and either comments `@claude build` (#334) or `/spec <requested changes>` to
# re-spec. Per the #339/#347 review rescope the gate is OPT-IN for engine/strategy-labelled work
# only — routine infra/doc issues go straight to `@claude build`, and `trivial` issues never
# come here at all.
#
# Spec artifacts are deliberately EPHEMERAL (an issue comment, not research/specs/*.md files):
# this repo has already been bitten by docs describing a dead engine — a spec that lived only
# long enough to gate its build can't rot.
#
# Security (#343/#348): hosted runner only; owner-gated trigger; SHA-pinned action;
# least-privilege permissions; Max-subscription OAuth token only (never ANTHROPIC_API_KEY).
# Injection backstop: the human review of the spec MUST sanity-check its files-touched claim
# against reality before approving the build.
#
# Model policy (§4): engine/strategy-labelled specs get Opus 4.8 (a wrong call there is
# expensive); everything else Sonnet 5.

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

permissions: {} # job-level below; nothing by default (#348)

jobs:
  spec:
    name: spec agent (research only)
    if: >-
      github.repository == 'bennetwi92/small-cap-stack' &&
      !github.event.issue.pull_request &&
      !contains(github.event.issue.labels.*.name, 'trivial') &&
      (
        (github.event_name == 'issue_comment' &&
         startsWith(github.event.comment.body, '/spec') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                   github.event.comment.author_association)) ||
        (github.event_name == 'issues' && github.event.label.name == 'needs-spec')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read # read the repo/research docs; specs never touch code
      issues: write # post the spec comment, flip needs-spec -> spec-ready
    steps:
      - name: Gate on the Max-subscription token
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN is not set — /spec is inert (RUNBOOK §13)."
          fi

      # §4: Opus for engine/strategy-labelled work, Sonnet otherwise.
      - name: Pick the model by label
        id: model
        if: steps.gate.outputs.ok == 'true'
        env:
          STRATEGY: ${{ contains(github.event.issue.labels.*.name, 'strategy') }}
        run: |
          set -euo pipefail
          if [ "$STRATEGY" = "true" ]; then
            echo "model=claude-opus-4-8" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-sonnet-5" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.ok == 'true'
        with:
          fetch-depth: 1

      - name: Write the spec
        if: steps.gate.outputs.ok == 'true'
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1 (#348 SHA-pinned)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model ${{ steps.model.outputs.model }}"
          prompt: |
            You are the SPEC agent for this repository (research/github-automation.md §3, issue
            #339). Your task is RESEARCH ONLY for issue #${{ github.event.issue.number }}.

            1. Read issue #${{ github.event.issue.number }} and ALL its comments with
               `gh issue view`. If the triggering comment starts with `/spec` and carries text
               after it, treat that text as change-requests against the previous spec comment.
            2. Research: read the relevant `research/` docs (start from decisions.md and
               findings-index.md; bull-flag.md + engine-v2.md for engine work) and the code the
               issue touches. Respect CLAUDE.md.
            3. Post ONE issue comment titled "## Spec (revision N)" containing exactly these
               sections: Problem · Approach · Config knobs to wire (name them — a knob not wired
               through Settings does nothing, #302) · Test plan · Risks · Files touched.
               Keep it readable on a phone.
            4. Then: `gh issue edit ${{ github.event.issue.number }} --add-label spec-ready
               --remove-label needs-spec` (ignore a failure to remove a label that isn't there).
            5. STOP. Do not create branches, commits, PRs, or files. Do not modify any file in
               the repository. If the issue is too vague to spec, post a comment asking the
               specific questions instead, and do NOT set spec-ready.
