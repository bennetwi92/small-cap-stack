# systemd drop-in for the self-hosted GitHub Actions runner.
#
# Install as (note the `.d` directory — this is an override, not the unit itself):
#   /etc/systemd/system/actions.runner.<owner>-<repo>.<name>.service.d/restart.conf
#   systemctl daemon-reload && systemctl restart actions.runner.<owner>-<repo>.<name>.service
#
# WHY: when a job gets OOM-killed, the runner listener exits *cleanly* (status 0) and logs
# "Runner listener exit with 0 return code, stop the service, no retry needed". The unit that
# `svc.sh install` generates has no Restart= directive, so systemd honours that and leaves the
# service `failed` — forever. On 2026-07-16 one OOM-killed backfill took CI down for 5h37m; every
# dispatch just queued against an offline runner until someone noticed. Restart=always overrides
# the listener's own stop-the-service decision.
#
# This is a drop-in rather than an edit to the generated unit because `svc.sh install` rewrites
# the unit file and would silently drop the change.
#
# NOTE: deliberately no MemoryMax=. Box jobs run their real work via `docker exec` into the app
# container, so that work lives in the *container's* cgroup, not the runner service's — a
# MemoryMax here would only cap the few-MB `docker` CLI client and would not prevent the OOM it
# looks like it prevents. Constraining backfill memory has to happen at the container level.

[Service]
Restart=always
RestartSec=30

[Unit]
# Loose on purpose: if the box is genuinely wedged we still want the runner retrying rather than
# giving up permanently and reintroducing the exact silent-outage failure mode above.
StartLimitIntervalSec=600
StartLimitBurst=10
