<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>small-cap-stack · review workbench</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="cockpit.css" />
  </head>
  <body class="review">
    <!-- Cockpit app bar (#291): rendered by the shared module. The page keeps
         its single-screen 100dvh phone layout below it; there is deliberately
         NO bottom status bar here — the readout strip IS this page's status
         line, and the chart owns every spare pixel. -->
    <header id="appbar" class="appbar"></header>

    <div class="rv-wrap">
      <!-- Top control bar (#142) in options-bar clothing: same IDs, same
           elements — review.js populates and drives them itself. -->
      <div class="optbar rv-optbar">
        <div class="optbar-row">
          <label class="opt-field"><span class="opt-label">Date</span>
            <select id="rv-date" class="opt-input rv-date" title="Trading date"></select>
          </label>
          <label class="opt-field rv-symbol-field"><span class="opt-label">Opp</span>
            <select id="rv-symbol" class="opt-input rv-symbol" title="Opportunity"></select>
          </label>
          <div class="opt-field rv-step">
            <button id="rv-prev" class="opt-btn rv-arrow" title="Previous opportunity">‹</button>
            <button id="rv-next" class="opt-btn rv-arrow" title="Next opportunity">›</button>
          </div>
        </div>
      </div>

      <!-- Chart fills the remaining height; keeps TradingView's native pan/zoom -->
      <div id="rv-chart" class="rv-chart"></div>

      <!-- Annotation toolbar (#144): arm which element the next chart tap sets. -->
      <div class="rv-tools" role="toolbar" aria-label="Annotation tools">
        <button class="rv-tool" data-mode="pole" title="Mark the pole (two taps)">Pole</button>
        <button class="rv-tool" data-mode="cons" title="Mark the consolidation (two taps)">Cons</button>
        <button class="rv-tool" data-mode="entry" title="Set entry (one tap)">Entry</button>
        <button class="rv-tool" data-mode="stop" title="Set stop (one tap)">Stop</button>
        <button id="rv-clear" class="rv-tool rv-clear" title="Clear annotations">Clear</button>
        <button id="rv-notrigger" class="rv-verdict" type="button" aria-pressed="false" title="Mark as no trigger — not a tradeable setup (entry/stop not applicable)">No trigger</button>
        <!-- Engine overlay toggle (#216): show/hide the engine-v2 detector's read (pole/consolidation
             bands, H/L/E tokens, base/peak, prior cycles) so it reads like-for-like against the
             trader's own annotations. Default ON. -->
        <button id="rv-engine-toggle" class="rv-engine-toggle armed" type="button" aria-pressed="true" title="Show/hide the engine's read (pole/consolidation, tokens, cycles)">Engine</button>
        <span id="rv-ann" class="rv-ann muted">tap a tool to draw</span>
      </div>

      <!-- Bottom strip: entry / stop / Max-R readout + save + notes toggle (#143, #156) -->
      <footer class="rv-bottom">
        <span id="rv-readout" class="rv-readout muted">loading…</span>
        <button id="rv-news-toggle" class="rv-btn rv-news-btn" title="News headlines captured at scanner trigger" disabled>News 0</button>
        <button id="rv-save-top" class="rv-btn rv-save-btn" title="Save this review (verdict + levels + note)">Save</button>
        <button id="rv-notes-toggle" class="rv-btn rv-notes-btn" title="Notes">Notes</button>
      </footer>
    </div>

    <!-- Slide-up notes sheet (#143): keeps the chart full-height while closed.
         On desktop (≥900px) the sheets dock as a right-hand drawer instead. -->
    <div id="rv-scrim" class="rv-scrim" hidden></div>
    <section id="rv-sheet" class="rv-sheet" aria-hidden="true" aria-label="Opportunity notes">
      <div class="rv-sheet-head">
        <strong id="rv-sheet-title" class="rv-sheet-title">Notes</strong>
        <button id="rv-sheet-close" class="rv-btn rv-sheet-close" title="Close">✕</button>
      </div>
      <!-- Fine-grained PAT (contents: read+write, this repo). Lives only in this phone's localStorage. -->
      <details id="rv-pat-details" class="rv-pat">
        <summary>GitHub token</summary>
        <input
          id="rv-pat"
          type="password"
          class="rv-pat-input"
          placeholder="fine-grained PAT · contents: read + write"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <small class="muted">Stored only in this browser (localStorage); needed to save.</small>
      </details>
      <textarea
        id="rv-note"
        class="rv-note"
        rows="6"
        placeholder="What should have happened — pole, consolidation, where entry/stop belonged, Max R…"
      ></textarea>
      <div class="rv-sheet-actions">
        <button id="rv-save" class="rv-save">Save review</button>
        <span id="rv-save-status" class="rv-save-status muted"></span>
      </div>
    </section>

    <!-- Slide-up news drawer (#109): headlines captured when the scanner triggered, read while noting. -->
    <section id="rv-news-sheet" class="rv-sheet" aria-hidden="true" aria-label="News headlines">
      <div class="rv-sheet-head">
        <strong id="rv-news-title" class="rv-sheet-title">News</strong>
        <button id="rv-news-close" class="rv-btn rv-sheet-close" title="Close">✕</button>
      </div>
      <div id="rv-news-list" class="rv-news-list"></div>
    </section>

    <!-- Slide-up engine drawer (#216): the detector's verdict, per-gate reasons, score
         contributions and cycle/exhaustion context — the explainable ranking behind the on-chart
         overlay. Opened by tapping the engine badge in the readout strip. -->
    <section id="rv-engine-sheet" class="rv-sheet" aria-hidden="true" aria-label="Engine detection detail">
      <div class="rv-sheet-head">
        <strong id="rv-engine-title" class="rv-sheet-title">Engine</strong>
        <button id="rv-engine-close" class="rv-btn rv-sheet-close" title="Close">✕</button>
      </div>
      <div id="rv-engine-detail" class="rv-engine-detail"></div>
    </section>

    <script type="module" src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="review.js"></script>
  </body>
</html>
