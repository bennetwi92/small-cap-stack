<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>small-cap-stack · results table</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.5.2/dist/css/tabulator.min.css"
    />
    <link rel="stylesheet" href="cockpit.css" />
  </head>
  <body>
    <!-- Cockpit chrome (#288): app bar + options bar render themselves; the
         status bar self-mounts at the bottom. The grid owns everything between. -->
    <header id="appbar" class="appbar"></header>
    <div id="optbar"></div>
    <p id="rs-error" class="error" hidden></p>
    <div id="rs-grid" class="fill-grid"></div>
    <script type="module" src="results.js"></script>
  </body>
</html>
