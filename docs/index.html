<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>small-cap-stack · tracker dashboard</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="cockpit.css" />
  </head>
  <body>
    <!-- Cockpit chrome (#289): app bar + options bar render themselves; box
         health lives in the self-mounting bottom status bar, not a card. -->
    <header id="appbar" class="appbar"></header>
    <div id="optbar"></div>
    <p id="error" class="error" hidden></p>

    <div class="dash">
      <!-- Left rail: live day — what's happening right now. -->
      <div class="dash-left">
        <section class="panel">
          <h2 class="panel-h">Opportunities today (<span id="opps-count">0</span>)</h2>
          <p id="opps-symbols" class="dash-syms muted">—</p>
        </section>
        <section class="panel">
          <h2 class="panel-h">Data collected — today / total</h2>
          <div id="data" class="tiles"></div>
        </section>
        <section class="panel">
          <h2 class="panel-h">Scanner</h2>
          <div id="scanner"></div>
        </section>
        <section class="panel dash-jobs">
          <h2 class="panel-h">Schedule</h2>
          <div id="tasks" class="tbl-wrap"></div>
        </section>
      </div>

      <!-- Right: the last completed session — per-opportunity statistics
           (scrolls inside its panel, never the body). The live-day trade chart
           was retired here; the annotated candlesticks (now with intraday VWAP)
           live on the review workbench, which is the chart actually used. -->
      <div class="dash-right">
        <section class="panel dash-session">
          <h2 class="panel-h">
            Last session <span id="session-date" class="muted">—</span> ·
            <span id="session-opps-count">0</span> opps
          </h2>
          <p id="session-opps-symbols" class="dash-syms muted">—</p>
          <p id="session-agg" class="dash-agg muted"></p>
          <div id="stats" class="tbl-wrap dash-stats"></div>
        </section>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
