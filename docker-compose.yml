# Phase-1 tracker: IB Gateway (gnzsnz image + IBC) + the app, on one host.
# Secrets come from .env (gitignored). See deploy/RUNBOOK.md.
services:
  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID:?set in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?set in .env}
      TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      TWS_ACCEPT_INCOMING: accept
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-23:45 PM}
      TIME_ZONE: ${TZ:-America/New_York}
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_2FA_TIMEOUT: "yes"
      # What IBC does when IBKR reports this username is already logged in elsewhere.
      # 'manual' (IBC default) blocks on the dialog forever; 'primary' takes over the
      # session (kicks the other login); 'secondary' yields. Set per-host in .env.
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-manual}
    healthcheck:
      # Gateway is up once the API socket accepts connections.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/4002' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s

  app:
    # Deploys PULL this prebuilt image rather than building on-box (#278): a build on the 2 vCPU /
    # 4 GB box competed with the live tracker mid-collection and left ~10 GB of BuildKit cache.
    # build-image.yml pushes `sha-<short>` for every commit on main; deploy.yml sets IMAGE_TAG to
    # the deployed commit's. `latest` is the fallback for a plain `docker compose up` by hand.
    image: ghcr.io/bennetwi92/small-cap-stack:${IMAGE_TAG:-latest}
    # Kept for LOCAL dev only (`docker compose build app`) — deploys pass --no-build so this is
    # never the source on the box. GIT_SHA is baked into DEPLOYED_COMMIT by CI (#72).
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
    restart: unless-stopped
    depends_on:
      ibgateway:
        condition: service_healthy
    environment:
      IBKR_HOST: ibgateway
      IBKR_PORT: ${IBKR_PORT:-4004}  # socat port (paper 4004 / live 4003); raw API 4002/4001 is localhost-only
      IBKR_TRADING_MODE: ${IBKR_TRADING_MODE:-paper}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL:-}
      FMP_API_KEY: ${FMP_API_KEY:-}  # float source (#109); unset -> yfinance-only
      JSON_LOGS: "true"
      METRICS_PORT: "9090"
      TZ: ${TZ:-America/New_York}
    volumes:
      - scs-data:/data
    ports:
      - "127.0.0.1:9090:9090"  # /metrics, bound to localhost (scrape via tunnel/agent)

volumes:
  scs-data:
